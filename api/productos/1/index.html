<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto 1</title>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/API-Productos-Resto/service-worker.js')
        .then(() => {
          const apiUrl = '/API-Productos-Resto/api/productos/1';
          return fetch(apiUrl);
        })
        .then(response => response.json())
        .then(data => {
          document.getElementById('response').textContent = JSON.stringify(data, null, 2);
        })
        .catch(error => {
          document.getElementById('response').textContent = 'Error: ' + error.message;
        });
    } else {
      document.getElementById('response').textContent = 'Service Worker no soportado';
    }
  </script>
</head>
<body>
  <pre id="response">Cargando...</pre>
</body>
</html>
